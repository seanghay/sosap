name: wheels

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

# Single source of truth for the supported Python versions. Update here and
# the build + smoke-test jobs pick it up.
env:
  PY_VERSIONS: "3.11 3.12 3.13 3.14"

jobs:
  # Linux builds use the maturin-action's manylinux/musllinux docker images,
  # which ship every supported CPython. We can therefore batch all versions
  # in a single matrix entry per (target, libc) — much faster than one job
  # per Python version on Linux.
  linux:
    name: linux ${{ matrix.platform.libc }} ${{ matrix.platform.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - target: x86_64
            libc: manylinux
            manylinux: auto
          - target: aarch64
            libc: manylinux
            manylinux: auto
          - target: x86_64
            libc: musllinux
            manylinux: musllinux_1_2
          - target: aarch64
            libc: musllinux
            manylinux: musllinux_1_2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build CPython wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          manylinux: ${{ matrix.platform.manylinux }}
          args: >-
            --release --out dist --strip
            --interpreter
            python3.11 python3.12 python3.13 python3.14
          sccache: "true"
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform.libc }}-${{ matrix.platform.target }}
          path: dist

  # macOS and Windows can't run multiple CPythons in one container, so we
  # parallelize across (target, python-version).
  macos:
    name: macos ${{ matrix.platform.target }} py${{ matrix.python-version }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: macos-14
            target: aarch64
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --strip --interpreter ${{ matrix.python-version }}
          sccache: "true"
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.platform.target }}-py${{ matrix.python-version }}
          path: dist

  windows:
    name: windows ${{ matrix.python-version }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          architecture: x64
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: x64
          args: --release --out dist --strip --interpreter ${{ matrix.python-version }}
          sccache: "true"
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x64-py${{ matrix.python-version }}
          path: dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  # Verify the produced wheels actually install + import on each supported
  # interpreter / platform combination. Catches ABI mismatches early.
  smoke-test:
    needs: [linux, macos, windows]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - name: Install + import
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-index --find-links dist sosap
          python -c "from sosap import Model, PathData; print('import ok'); print('module:', Model.__module__)"

  # Aggregate all artifacts into a single release-ready bundle.
  collect:
    needs: [linux, macos, windows, sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - name: List wheels
        run: ls -la dist
      - uses: actions/upload-artifact@v4
        with:
          name: all-wheels
          path: dist

  # Publish wheels + sdist to PyPI when a GitHub Release is published.
  # Requires a `PYPI_PASSWORD` secret holding a PyPI API token.
  publish:
    needs: [linux, macos, windows, sdist, smoke-test]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - name: Upload to PyPI
        uses: PyO3/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_PASSWORD }}
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*
